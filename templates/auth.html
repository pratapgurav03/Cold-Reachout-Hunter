<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cold Reachout Hunter — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Barlow+Condensed:wght@700;800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --lime: #f040b5;
    --lime-dark: #db2777;
    --bg-page: #0e0e52;
    --bg-card: #16166a;
    --bg-input: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.1);
    --text-primary: #fff;
    --text-secondary: #b0b0e0;
    --text-muted: rgba(255,255,255,0.35);
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-condensed: 'Barlow Condensed', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'Space Mono', monospace;
    --danger: #ef4444;
    --success: #10b981;
  }

  body {
    font-family: var(--font-body);
    background: var(--bg-page);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Background image */
  .page-bg {
    position: fixed; inset: 0; z-index: 0;
    background-image: url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?auto=format&fit=crop&w=1920&q=80');
    background-size: cover; background-position: center;
  }
  .page-bg::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(8,8,58,0.97) 0%, rgba(14,14,82,0.88) 60%, rgba(8,8,58,0.97) 100%);
  }

  /* Card */
  .auth-wrap {
    position: relative; z-index: 1;
    width: 100%; max-width: 440px;
    padding: 20px;
  }

  .brand {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeUp 0.6s 0.1s ease both;
  }
  .brand-title {
    font-family: var(--font-condensed);
    font-size: 28px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: #fff; line-height: 1;
  }
  .brand-title .pk { color: var(--lime); }
  .brand-sub {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--text-muted);
    margin-top: 8px; letter-spacing: 0.15em;
  }

  .card {
    background: rgba(22,22,106,0.85);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 36px;
    animation: fadeUp 0.6s 0.25s ease both;
  }

  .card-title {
    font-family: var(--font-display);
    font-size: 28px; font-style: italic;
    color: #fff; margin-bottom: 6px;
  }
  .card-sub {
    font-size: 13px; color: var(--text-secondary);
    margin-bottom: 28px;
  }

  /* Form */
  .form-group { margin-bottom: 16px; }
  label {
    display: block; font-size: 11px; font-weight: 700;
    color: var(--text-secondary); text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 6px;
  }
  input[type="text"], input[type="email"], input[type="password"] {
    width: 100%; padding: 11px 14px;
    background: var(--bg-input);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 5px; color: #fff; font-size: 14px;
    font-family: var(--font-body); outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input::placeholder { color: rgba(255,255,255,0.25); }
  input:focus {
    border-color: var(--lime);
    background: rgba(255,255,255,0.08);
    box-shadow: 0 0 0 3px rgba(240,64,181,0.2);
  }

  .btn {
    display: flex; align-items: center; justify-content: center;
    width: 100%; padding: 12px;
    border-radius: 5px; font-size: 13px; font-weight: 700;
    cursor: pointer; border: none; font-family: var(--font-body);
    letter-spacing: 0.05em; text-transform: uppercase;
    transition: all 0.18s; margin-top: 8px;
  }
  .btn-primary {
    background: var(--lime); color: #fff;
    box-shadow: 0 0 24px rgba(240,64,181,0.4);
  }
  .btn-primary:hover { background: var(--lime-dark); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

  /* Toggle */
  .toggle {
    text-align: center; margin-top: 20px;
    font-size: 13px; color: var(--text-secondary);
  }
  .toggle a {
    color: var(--lime); text-decoration: none; font-weight: 600; cursor: pointer;
  }
  .toggle a:hover { text-decoration: underline; }

  /* Feedback */
  .feedback {
    padding: 10px 14px; border-radius: 5px;
    font-size: 13px; font-weight: 500; margin-bottom: 16px; display: none;
  }
  .feedback.error   { background: rgba(239,68,68,0.15);  color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }
  .feedback.success { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.25); }
  .feedback.show { display: block; }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.7s linear infinite; display: none; margin-right: 8px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Name field (signup only) */
  #nameGroup { display: none; }
</style>
</head>
<body>

<div class="page-bg"></div>

<div class="auth-wrap">
  <div class="brand">
    <div class="brand-title"><span class="pk">COLD</span> REACHOUT HUNTER</div>
    <div class="brand-sub">Fall 2026 · Internship Outreach Platform</div>
  </div>

  <div class="card">
    <div class="card-title" id="cardTitle">Welcome back.</div>
    <div class="card-sub" id="cardSub">Sign in to your account to continue.</div>

    <div class="feedback" id="feedback"></div>

    <div class="form-group" id="nameGroup">
      <label>Your Name</label>
      <input type="text" id="nameInput" placeholder="e.g. Alex Johnson" autocomplete="name">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="emailInput" placeholder="you@gmail.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') submit()">
    </div>

    <button class="btn btn-primary" id="submitBtn" onclick="submit()">
      <div class="spinner" id="spinner"></div>
      <span id="submitLabel">Sign In</span>
    </button>

    <div class="toggle">
      <span id="toggleText">Don't have an account?</span>
      <a onclick="toggleMode()"> <span id="toggleLink">Create one</span></a>
    </div>
  </div>
</div>

<script>
let isSignup = false;

function toggleMode() {
  isSignup = !isSignup;
  document.getElementById('nameGroup').style.display    = isSignup ? 'block' : 'none';
  document.getElementById('cardTitle').textContent      = isSignup ? 'Create your account.' : 'Welcome back.';
  document.getElementById('cardSub').textContent        = isSignup
    ? 'Set up your Cold Reachout Hunter account.'
    : 'Sign in to your account to continue.';
  document.getElementById('submitLabel').textContent    = isSignup ? 'Create Account' : 'Sign In';
  document.getElementById('toggleText').textContent     = isSignup ? 'Already have an account?' : "Don't have an account?";
  document.getElementById('toggleLink').textContent     = isSignup ? 'Sign in' : 'Create one';
  showFeedback('', '');
}

function showFeedback(type, msg) {
  const el = document.getElementById('feedback');
  el.className = 'feedback' + (type ? ` ${type} show` : '');
  el.textContent = msg;
}

function setLoading(on) {
  document.getElementById('submitBtn').disabled = on;
  document.getElementById('spinner').style.display = on ? 'inline-block' : 'none';
}

async function submit() {
  const email    = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const name     = document.getElementById('nameInput').value.trim();

  if (!email || !password) { showFeedback('error', 'Please fill in all fields.'); return; }
  if (isSignup && !name)   { showFeedback('error', 'Please enter your name.');    return; }

  setLoading(true);
  showFeedback('', '');

  const endpoint = isSignup ? '/api/auth/signup' : '/api/auth/login';
  const payload  = isSignup ? { email, password, name } : { email, password };

  try {
    const res  = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    let data;
    try { data = await res.json(); }
    catch { data = { error: `Server error (${res.status}) — check terminal for details` }; }

    if (data.ok) {
      showFeedback('success', isSignup ? `Account created! Welcome, ${data.name}.` : `Welcome back, ${data.name}!`);
      setTimeout(() => window.location.href = '/', 800);
    } else {
      showFeedback('error', data.error || 'Something went wrong. Try again.');
      setLoading(false);
    }
  } catch (e) {
    showFeedback('error', `Request failed: ${e.message}`);
    setLoading(false);
  }
}
</script>
</body>
</html>
