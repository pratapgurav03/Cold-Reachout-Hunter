services:
  - type: web
    name: cold-reachout-hunter
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: HUNTER_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: SENDER_NAME
        sync: false
      - key: DATABASE_URL
        sync: false          # Set to your Supabase/PostgreSQL connection string
      - key: SECRET_KEY
        sync: false          # Set a long random string for session security
      - key: FLASK_ENV
        value: production
      - key: GOOGLE_CLIENT_ID
        sync: false          # From Google Cloud Console → APIs → Credentials → OAuth 2.0
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false          # Set to: https://<your-app>.onrender.com/auth/gmail/callback
